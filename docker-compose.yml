services:
  # Frontend
  frontend:
    build:
      context: ./frontend
    container_name: task-management-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    # Auth Service
  auth-service:
    image: abstraxlk/task-management-auth-service:5
    # build:
    #   context: ./services/auth-service
    container_name: task-management-auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - .env
    # Task Service
  task-service:
    image: abstraxlk/task-management-task-service:5
    # build:
    #   context: ./services/task-service
    container_name: task-management-task-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    env_file:
      - .env
